name: Clean up after merge

# Closes the linked issue and transitions it to afk/done when a fix/issue-N branch is merged.

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'fix/issue-')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Close issue and apply afk/done
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const match = branch.match(/^fix\/issue-(\d+)$/);
            if (!match) {
              core.info(`Branch ${branch} does not match fix/issue-N pattern. Skipping.`);
              return;
            }

            const issueNumber = parseInt(match[1]);
            core.info(`Closing issue #${issueNumber} linked to merged branch ${branch}`);

            for (const label of ['afk/ready', 'afk/in-progress', 'afk/review']) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: label
              }).catch(() => {});
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['afk/done']
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed'
            });
