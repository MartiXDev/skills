name: Clean up after merge

# Closes the linked issue and transitions it to afk/done when a fix/issue-N branch is merged,
# or when a PR body contains a closing keyword (Closes/Fixes/Resolves #N) for Track A cloud agent PRs.

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Close issue and apply afk/done
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const body = context.payload.pull_request.body || '';

            // Primary: resolve issue number from branch name (Track B — local orchestrator)
            let issueNumber = null;
            const branchMatch = branch.match(/^fix\/issue-(\d+)$/);
            if (branchMatch) {
              issueNumber = parseInt(branchMatch[1]);
            }

            // Fallback: resolve from closing keywords in PR body (Track A — cloud agent)
            if (!issueNumber) {
              const bodyMatch = body.match(/(?:closes?|fixes?|resolves?)\s+#(\d+)/i);
              if (bodyMatch) {
                issueNumber = parseInt(bodyMatch[1]);
              }
            }

            if (!issueNumber) {
              core.info(`Branch ${branch} does not match fix/issue-N pattern and no closing issue reference found in PR body. Skipping.`);
              return;
            }

            core.info(`Closing issue #${issueNumber} linked to merged PR (branch: ${branch})`);

            for (const label of ['afk/ready', 'afk/in-progress', 'afk/review']) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: label
              }).catch(() => {});
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['afk/done']
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed'
            });
