name: Poll cloud agent tasks

# Runs every 15 minutes to check the status of in-progress cloud agent tasks
# and transition issue labels when tasks complete or fail.
# Requires: COPILOT_AGENT_TOKEN secret (user PAT).

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Poll in-progress issues
        uses: actions/github-script@v7
        env:
          COPILOT_AGENT_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN }}
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'afk/in-progress',
              state: 'open',
              per_page: 50
            });

            if (issues.length === 0) {
              core.info('No in-progress issues found.');
              return;
            }

            for (const issue of issues) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100
              });

              const taskComment = comments.find(c => c.body.includes('<!-- afk-task-id:'));
              if (!taskComment) {
                core.warning(`Issue #${issue.number} is afk/in-progress but has no task ID comment. Skipping.`);
                continue;
              }

              const match = taskComment.body.match(/<!-- afk-task-id:\s*([^\s]+)\s*-->/);
              if (!match) continue;
              const taskId = match[1];

              const response = await fetch(
                `https://api.github.com/agents/repos/${context.repo.owner}/${context.repo.repo}/tasks/${taskId}`,
                {
                  headers: {
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Authorization': `Bearer ${process.env.COPILOT_AGENT_TOKEN}`
                  }
                }
              );

              if (!response.ok) {
                core.warning(`Could not fetch task ${taskId} for issue #${issue.number}: ${response.status}`);
                continue;
              }

              const task = await response.json();
              core.info(`Issue #${issue.number} task ${taskId} state: ${task.state}`);

              const terminalStates = ['completed', 'failed', 'timed_out', 'cancelled'];
              if (!terminalStates.includes(task.state) && task.state !== 'waiting_for_user') {
                core.info(`Task still running (${task.state}). Skipping.`);
                continue;
              }

              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'afk/in-progress'
              }).catch(() => {});

              if (task.state === 'completed') {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['afk/review']
                });
                const prLink = task.pull_request_url
                  ? `\n\nPull request: ${task.pull_request_url}`
                  : '';
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `**AFK complete** — Cloud agent finished. Please review the changes before merging.${prLink}`
                });
              } else {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['hitl']
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: [
                    `**AFK stalled** — Task ended with state \`${task.state}\`. Human review needed.`,
                    '',
                    `Task ID: \`${taskId}\``,
                    '',
                    task.state === 'waiting_for_user'
                      ? 'The agent is waiting for input. Open the task on GitHub to respond.'
                      : 'The task failed or was cancelled. Re-open with a revised prompt or handle manually.'
                  ].join('\n')
                });
              }
            }
